name: Tasks

permissions:
  id-token: write  # Required for OIDC
  contents: read

on:
  push:
    branches:
      - "*"
    tags:
      - "*"
  pull_request:
    branches:
      - "*"
  schedule:
    - cron: "0 2 * * 1-5"

jobs:
  lint-php:
    name: "linting:    php: ${{ matrix.php }} TYPO3: ${{ matrix.typo3 }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.3', '8.4', '8.5' ]
        typo3: [ '13', '14' ]
    steps:
      - name: Setup PHP with PECL extension
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.php }}-composer-
      - run: composer require typo3/minimal="^${{ matrix.typo3 }}" --dev --ignore-platform-req=php+
      - run: ./vendor/bin/grumphp run --ansi
      - run: composer test:unit

  playwright:
    name: "playwright: php: ${{ matrix.php }} TYPO3: ${{ matrix.typo3 }} Storybook: ${{ matrix.storybook }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.3', '8.4', '8.5' ]
        typo3: [ '13', '14' ]
        # not implemented yet:
        storybook: [ '9.0' ]
    env:
      PHP_IMAGE_VERSION: ${{ matrix.php }}
      TYPO3_VERSION: ${{ matrix.typo3 }}
      # not implemented yet:
      STORYBOOK_VERSION: ${{ matrix.storybook }}
    defaults:
      run:
        working-directory: .Build
    steps:
      - uses: actions/checkout@v6
      - run: chmod -R 0777 ..
      - run: bash test.sh playwright
      - run: bash test.sh logs typo3 --tail=100
        if: always()
      - run: docker inspect --format "{{json .State.Health }}" testing-storybook-typo3-1 | jq '.Log[].Output'
        if: always()
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-php-${{ matrix.php }}-typo3-${{ matrix.typo3 }}-storybook-${{ matrix.storybook }}
          path: Documentation/dummy-project/playwright-report

  tests-documentation:
    name: documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test if the documentation will render without warnings
        run: |
          mkdir -p Documentation-GENERATED-temp \
          && docker run --rm --pull always -v $(pwd):/project \
             ghcr.io/typo3-documentation/render-guides:latest --config=Documentation --no-progress --minimal-test

  npm-publish:
    name: npm publish
    runs-on: ubuntu-latest
    needs: [ lint-php, playwright ]
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: ./the-npm-package/
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: "the-npm-package"
          registry-url: 'https://registry.npmjs.org'
      - name: Debug setup-node
        run: |
          node -v
          npm -v
          npm config get registry
          echo "project .npmrc:"
          cat .npmrc || true
      - name: Get the version
        id: get-version
        run: echo "version=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV
      - run: npm ci
      - run: npm --no-git-tag-version version ${{ env.version }}
      - run: npm publish --access public


  ter-release:
    name: Publish new version to TER
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ lint-php, playwright ]
    env:
      TYPO3_API_TOKEN: ${{ secrets.TYPO3_API_TOKEN }}

    steps:
      - uses: actions/checkout@v6
      - name: Get the version
        id: get-version
        run: echo "version=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, mbstring, xml, soap, zip, curl

      - name: Get comment
        id: get-comment
        run: |
          curl -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/andersundsehr/storybook/releases/tags/${{ env.version }} > release.json

          readonly local comment=$(
            jq -r '.name, "", .body, "", .html_url' release.json \
            | php -r 'echo preg_replace("/[\x{1F1E6}-\x{1F1FF}\x{1F300}-\x{1FAFF}\x{2600}-\x{27BF}\x{FE0F}\x{200D}]/u", "", stream_get_contents(STDIN));' \
          )

          {
            echo 'comment<<EOF'
            echo "$comment"
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Install typo3/tailor
        run: composer global require typo3/tailor --prefer-dist --no-progress

      - name: Upload EXT:visual_editor to TER
        run: |
          sed -i "s|'dev-'|'${{ env.version }}'|g" ext_emconf.php \
          && git config --global user.email "no@one" \
          && git config --global user.name "No One" \
          && git add ext_emconf.php \
          && git commit -m 'x' -n \
          && git archive -o archive.zip HEAD --prefix=storybook-${{ env.version }}/ \
          && git reset --hard HEAD~ \
          && php ~/.composer/vendor/bin/tailor ter:publish -vvv ${{ env.version }} --artefact=archive.zip --comment="${{ env.comment }}"
